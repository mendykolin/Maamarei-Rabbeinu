<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>טוען חוברת... – סיכומים במאמרי רבינו</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700;900&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a3a5c;
    --navy-light: #2a5080;
    --gold: #e8c840;
    --gold-light: #f5e080;
    --sky: #d9eef9;
    --sky-dark: #7ec3e8;
    --white: #ffffff;
    --gray: #f4f7fa;
    --text: #1a2e42;
    --text-light: #3a5068;
    --text-muted: #8fa3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Heebo, sans-serif; background: var(--sky); color: var(--text); min-height: 100vh; direction: rtl; }

  /* HEADER */
  header { background: linear-gradient(135deg, var(--navy), var(--navy-light)); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 16px rgba(26,58,92,0.3); }
  .logo { font-family: 'Frank Ruhl Libre', serif; font-size: 20px; font-weight: 900; color: var(--gold-light); text-decoration: none; }
  .back-btn { background: rgba(255,255,255,0.12); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: Heebo, sans-serif; font-size: 14px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: background 0.2s; }
  .back-btn:hover { background: rgba(255,255,255,0.2); }

  /* MAIN LAYOUT */
  main { max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; }

  /* PRODUCT PAGE LAYOUT */
  .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 40px; }

  /* LEFT: COVER IMAGE */
  .product-cover-wrap { position: relative; }
  .product-cover { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(26,58,92,0.15); aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(126,195,232,0.3); }
  .product-cover img { width: 100%; height: 100%; object-fit: cover; }
  .product-cover-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(145deg, var(--sky) 0%, #c5e4f5 100%); gap: 16px; }
  .product-cover-placeholder-icon { font-size: 72px; }
  .product-cover-placeholder-text { font-family: 'Frank Ruhl Libre', serif; font-size: 18px; color: var(--navy); font-weight: 700; text-align: center; padding: 0 20px; }

  /* RIGHT: PRODUCT INFO */
  .product-info { display: flex; flex-direction: column; gap: 20px; }
  .product-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(232,200,64,0.15); border: 1.5px solid rgba(232,200,64,0.4); color: #8a6800; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; width: fit-content; }
  .product-title { font-family: 'Frank Ruhl Libre', serif; font-size: 30px; font-weight: 900; color: var(--navy); line-height: 1.3; }
  .product-divider { height: 2px; background: linear-gradient(to left, var(--sky-dark), transparent); border: none; }
  .product-desc { font-size: 15px; color: var(--text-light); line-height: 1.8; }
  .product-stats { display: flex; gap: 12px; flex-wrap: wrap; }
  .product-stat { background: white; border: 1.5px solid #e8edf3; padding: 8px 16px; border-radius: 12px; font-size: 13px; color: var(--text-light); font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .product-free-badge { display: inline-flex; align-items: center; gap: 6px; background: #dcfce7; border: 1.5px solid #86efac; color: #166534; padding: 8px 20px; border-radius: 12px; font-size: 14px; font-weight: 700; }

  /* DOWNLOAD BUTTON — like "Add to Cart" */
  .btn-download { width: 100%; padding: 18px 24px; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color: white; border: none; border-radius: 16px; font-family: 'Frank Ruhl Libre', serif; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 24px rgba(26,58,92,0.3); transition: all 0.2s; letter-spacing: 0.3px; }
  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(26,58,92,0.4); }
  .btn-download:active { transform: translateY(0); }
  .btn-download-icon { font-size: 22px; }

  .btn-price { width: 100%; padding: 18px 24px; background: linear-gradient(135deg, var(--gold) 0%, #d4a800 100%); color: var(--navy); border: none; border-radius: 16px; font-family: 'Frank Ruhl Libre', serif; font-size: 20px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 24px rgba(232,200,64,0.4); transition: all 0.2s; }
  .btn-price:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(232,200,64,0.5); }

  .trust-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .trust-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }

  /* PDF VIEWER */
  .pdf-section { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(26,58,92,0.1); }
  .pdf-section-header { background: var(--navy); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  .pdf-section-title { font-family: 'Frank Ruhl Libre', serif; color: white; font-size: 16px; font-weight: 700; }
  .pdf-section iframe { display: block; width: 100%; height: 80vh; min-height: 500px; border: none; }

  /* LOADING */
  .loading { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 16px; }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(26,58,92,0.15); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .product-grid { grid-template-columns: 1fr; gap: 24px; }
    .product-cover { aspect-ratio: 3/4; }
    main { padding: 20px 16px 40px; }
    .product-title { font-size: 24px; }
    .btn-download { font-size: 18px; padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">סיכומים במאמרי רבינו</a>
  <a class="back-btn" href="index.html">← חזרה</a>
</header>

<main id="main">
  <div class="loading">
    <div class="loading-spinner"></div>
    טוען חוברת...
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAnalytics, logEvent } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

const app = initializeApp({
  apiKey: "AIzaSyBLOrM83RtH4VToygfpo2dxG-NcpebcLiI",
  authDomain: "maamrei-rabenu.firebaseapp.com",
  projectId: "maamrei-rabenu",
  storageBucket: "maamrei-rabenu.firebasestorage.app",
  messagingSenderId: "484133741429",
  appId: "1:484133741429:web:f9a716cc670965048be93c",
  measurementId: "G-HCM33QST5Q"
});
const db = getFirestore(app);
let analytics = null;
try { analytics = getAnalytics(app); } catch(e) {}

const id = new URLSearchParams(window.location.search).get('id');
const fromIndex = document.referrer.includes('index.html') || document.referrer.endsWith('/Maamarei-Rabbeinu/') || document.referrer.endsWith('/Maamarei-Rabbeinu');

async function load() {
  if (!id) { showError('לא נמצא מזהה חוברת'); return; }

  const snap = await getDoc(doc(db, 'booklets', id));
  if (!snap.exists()) { showError('החוברת לא נמצאה'); return; }

  const b = { id: snap.id, ...snap.data() };

  if (!fromIndex) {
    try {
      const today = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Jerusalem'});
      await updateDoc(doc(db, 'booklets', id), { views: (b.views||0) + 1 });
      await setDoc(doc(db, `booklet_stats/${id}/daily`, today), { views: increment(1) }, { merge: true });
      const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
      const isPWA = window.matchMedia('(display-mode: standalone)').matches;
      const device = isPWA ? 'pwa' : isMobile ? 'mobile' : 'desktop';
      await setDoc(doc(db, 'site_stats', today), { visits: increment(1), [`device_${device}`]: increment(1) }, { merge: true });
      try { if(analytics) logEvent(analytics, 'view_booklet', { booklet_title: b.title, booklet_id: id }); } catch(e) {}
    } catch(e) {}
  }

  document.title = `${b.title} – סיכומים במאמרי רבינו`;

  let settings = {};
  try {
    const s = await getDoc(doc(db, 'config', 'settings'));
    if (s.exists()) settings = s.data();
  } catch(e) {}

  const cats = Array.isArray(b.categories) ? b.categories : (b.category ? [b.category] : []);
  const catBadges = cats.map(c => `<span class="product-badge">📂 ${c}</span>`).join('');

  const statsHtml = (settings.showViews && b.views > 0) || (settings.showDownloads && b.downloads > 0) ? `
    <div class="product-stats">
      ${settings.showViews && b.views > 0 ? `<div class="product-stat">👁 ${b.views.toLocaleString()} צפיות</div>` : ''}
      ${settings.showDownloads && b.downloads > 0 ? `<div class="product-stat">⬇ ${b.downloads.toLocaleString()} הורדות</div>` : ''}
    </div>` : '';

  const actionBtn = b.price > 0
    ? `<button class="btn-price" onclick="alert('עמוד רכישה בקרוב!')">💳 רכוש עכשיו — ₪${b.price}</button>`
    : b.pdfUrl
      ? `<button class="btn-download" onclick="countAndDownload('${b.id}','${b.pdfUrl}')">
           <span class="btn-download-icon">⬇</span> הורדה חינם
         </button>`
      : '';

  const pdfSection = b.pdfUrl ? `
    <div class="pdf-section">
      <div class="pdf-section-header">
        <span class="pdf-section-title">📄 צפייה בחוברת</span>
      </div>
      <iframe src="${b.pdfUrl}" allowfullscreen></iframe>
    </div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="product-grid">
      <div class="product-cover-wrap">
        <div class="product-cover">
          ${b.imgUrl
            ? `<img src="${b.imgUrl}" alt="${b.title}" />`
            : `<div class="product-cover-placeholder">
                <div class="product-cover-placeholder-icon">📄</div>
                <div class="product-cover-placeholder-text">${b.title}</div>
               </div>`}
        </div>
      </div>

      <div class="product-info">
        ${catBadges ? `<div style="display:flex;gap:8px;flex-wrap:wrap;">${catBadges}</div>` : ''}
        <h1 class="product-title">${b.title}</h1>
        <hr class="product-divider"/>
        ${b.desc ? `<p class="product-desc">${b.desc}</p>` : ''}
        ${statsHtml}
        <div class="product-free-badge">✓ חינם להורדה</div>
        ${actionBtn}

      </div>
    </div>

    ${pdfSection}
  `;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `<div class="loading">${msg}</div>`;
}

window.countAndDownload = async function(bookletId, pdfUrl) {
  try {
    const today = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Jerusalem'});
    const snap = await getDoc(doc(db, 'booklets', bookletId));
    const downloads = snap.exists() ? (snap.data().downloads||0) : 0;
    await updateDoc(doc(db, 'booklets', bookletId), { downloads: downloads + 1 });
    await setDoc(doc(db, `booklet_stats/${bookletId}/daily`, today), { downloads: increment(1) }, { merge: true });
    try { if(analytics) logEvent(analytics, 'download_booklet', { booklet_id: bookletId }); } catch(e) {}
  } catch(e) {}
  window.open(pdfUrl.replace('/preview', '/view'), '_blank');
};

load();
</script>
</body>
</html>
